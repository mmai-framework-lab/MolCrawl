channels:
  - conda-forge
dependencies:
  - numpy=1.26.4
  - ipykernel=6.26.0
  - ipython=8.18.0
  - ipython_genutils=0.2.0
  - ipywidgets=7.8.0
  - pandas=2.3.3
  - python=3.11
  - python_abi=3.11
  - pyyaml=5.4.1
  - pip=24.3.1
  - rdkit=2024.9.2
  - rich=12.6.0
  - typing-extensions>=4.14.1
  - dask=2024.2.1
  - matplotlib=3.9.2
  # cellxgene-census とその依存 (tiledbsoma-py, tiledb-py) は conda-forge 経由で導入する。
  # PyPI の tiledb 0.29.x には linux-aarch64 wheel が無くソースビルドで失敗するため。
  - cellxgene-census=1.17.0
  - tiledbsoma-py>=1.16.2,<2
  - pip:
      - torch==2.8.0
      # NOTE: linux-aarch64 では PyPI の汎用 torch==2.8.0 wheel が CPU 専用です。
      # NVIDIA aarch64 GPU (GB200/Grace 等) で使う場合は env 作成後に追加で:
      #   pip install --force-reinstall --no-deps \
      #     --index-url https://download.pytorch.org/whl 'torch==2.8.0+cu129'
      - accelerate==0.34.2
      - ncbi-genome-download==0.3.3
      - joblib==1.4.2
      # cellxgene_census は conda-forge 側で導入 (上記参照)
      - rich==13.8.0
      - transformers==4.45.1
      # transformers の hard dep ではないが prepare_gpt2.py / GuacaMol HF fallback 等で必須
      - datasets>=2.20,<3.0
      # scgpt==0.2.4 は torchtext を要求し linux-aarch64 で wheel が無いため除外。
      # オプショナル機能 (scgpt_tokenization.py の _scbank_export_via_scgpt) を使う場合のみ
      # 別途: pip install scgpt==0.2.4 --no-deps
      - rdchiral==1.1.0
      - loompy==3.0.8
      - sentencepiece==0.2.0
      - tensorboardX==2.6.2.2
      - safetensors==0.4.3
      - biopython==1.85
      - pysam==0.23.3
      - pyfaidx==0.9.0.1
      - fcd==1.2.2
      - guacamol==0.5.5
      - deepchem==2.8.0
      - wandb>=0.18.0,<0.19
      - iniconfig==2.1.0
      - pytest==8.4.2
      - pyarrow==23.0.1
      - scikit-learn==1.6.1
