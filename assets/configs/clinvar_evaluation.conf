# ClinVar評価設定ファイル
# このファイルはClinVar評価パイプラインの設定を管理します

[evaluation]
# モデル設定
default_model_size = small
model_sizes = ["small", "medium", "large", "xl"]

# データ設定
default_sequence_length = 100
max_sequence_length = 1024
default_max_samples = 1000
default_batch_size = 16

# ファイル設定
clinvar_url = "https://ftp.ncbi.nlm.nih.gov/pub/clinvar/vcf_GRCh38/clinvar.vcf.gz"
results_filename = "evaluation_results.json"
report_filename = "evaluation_report.txt"

[thresholds]
# 病原性予測の閾値
pathogenic_threshold = 0.5
confidence_threshold = 0.7

# パフォーマンス指標の期待値
min_accuracy = 0.6
min_precision = 0.6
min_recall = 0.6
min_f1_score = 0.6

[paths]
# データディレクトリ
data_dir = "clinvar_evaluation_results/data"
output_dir = "clinvar_evaluation_results"
visualization_dir = "clinvar_evaluation_results/visualizations"
models_dir = "gpt2-output"

[clinical_significance]
# ClinVarの臨床的意義カテゴリ
pathogenic_categories = [
    "Pathogenic",
    "Likely_pathogenic"
]

benign_categories = [
    "Benign",
    "Likely_benign"
]

uncertain_categories = [
    "Uncertain_significance",
    "Conflicting_interpretations_of_pathogenicity"
]

[logging]
# ログ設定
log_level = "INFO"
log_format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
log_file = "logs/clinvar_evaluation.log"
