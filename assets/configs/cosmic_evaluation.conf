# COSMIC評価設定ファイル
# このファイルはCOSMIC評価パイプラインの設定を管理します

[evaluation]
# モデル設定
default_model_size = small
model_sizes = ["small", "medium", "large", "xl"]

# データ設定
default_sequence_length = 100
max_sequence_length = 1024
default_max_samples = 1000
default_batch_size = 16

# ファイル設定
cosmic_base_url = "https://cancer.sanger.ac.uk/cosmic/file_download/GRCh38/cosmic/"
results_filename = "cosmic_evaluation_results.json"
report_filename = "cosmic_evaluation_report.txt"

[thresholds]
# 癌原性予測の閾値
oncogenic_threshold = 0.5
confidence_threshold = 0.7

# パフォーマンス指標の期待値
min_accuracy = 0.6
min_precision = 0.6
min_recall = 0.6
min_f1_score = 0.6

[paths]
# データディレクトリ
data_dir = "cosmic_evaluation_results/data"
output_dir = "cosmic_evaluation_results"
visualization_dir = "cosmic_evaluation_results/visualizations"
models_dir = "gpt2-output"

[cancer_significance]
# COSMICの癌関連度カテゴリ
oncogenic_categories = [
    "pathogenic",
    "likely_pathogenic",
    "oncogenic",
    "driver"
]

benign_categories = [
    "benign",
    "likely_benign",
    "neutral",
    "passenger"
]

uncertain_categories = [
    "uncertain_significance",
    "conflicting_interpretations",
    "unknown"
]

[mutation_types]
# COSMICで扱う変異タイプ
substitution_types = [
    "Substitution - Missense",
    "Substitution - Nonsense",
    "Substitution - Silent"
]

indel_types = [
    "Deletion - Frameshift",
    "Deletion - In frame",
    "Insertion - Frameshift",
    "Insertion - In frame"
]

complex_types = [
    "Complex",
    "Fusion",
    "Unknown"
]

[cancer_types]
# 主要な癌タイプ
primary_sites = [
    "lung",
    "breast",
    "colon",
    "prostate",
    "liver",
    "stomach",
    "pancreas",
    "brain",
    "kidney",
    "bladder"
]

[genes]
# 主要な癌関連遺伝子
tumor_suppressor_genes = [
    "TP53",
    "RB1",
    "APC",
    "BRCA1",
    "BRCA2",
    "VHL",
    "NF1",
    "CDKN2A"
]

oncogenes = [
    "KRAS",
    "MYC",
    "EGFR",
    "PIK3CA",
    "BRAF",
    "HER2",
    "RAS",
    "MET"
]

[logging]
# ログ設定
log_level = "INFO"
log_format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
log_file = "logs/cosmic_evaluation.log"
