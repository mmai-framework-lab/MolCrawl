# OMIM Evaluation Configuration
# ================================

# モデル設定
MODEL_SIZE=small
MODEL_PATH=gpt2-output/genome_sequence-small/ckpt.pt

# データ設定
SEQUENCE_LENGTH=100
MAX_SAMPLES=1000
RANDOM_SEED=42

# 評価設定
BATCH_SIZE=16
DEVICE=auto

# 出力設定
OUTPUT_DIR=omim_evaluation_results
VISUALIZATION_DIR=visualizations

# OMIMデータ設定
INHERITANCE_PATTERNS=autosomal_dominant,autosomal_recessive,x_linked,mitochondrial,complex
PATHOGENICITY_THRESHOLD=0.5

# 遺伝性疾患関連遺伝子 (サンプルデータ用)
DISEASE_GENES=BRCA1,BRCA2,TP53,APC,MLH1,MSH2,MSH6,PMS2,PALB2,CHEK2,ATM,BARD1,BRIP1,RAD51C,RAD51D,CDH1,PTEN,STK11,NF1,NF2,VHL,RB1,WT1,CDKN2A,CDK4,BAP1,MITF,POT1,ACD,TERF2IP,TERT,DCC,SMAD4,BMPR1A,MUTYH,NTHL1,POLE,POLD1,EPCAM,PMS1,AXIN2,GREM1,SCG5,RNF43

# 可視化設定
FIGURE_DPI=300
FIGURE_FORMAT=png
HTML_REPORT=true

# ログ設定
LOG_LEVEL=INFO
LOG_FILE=omim_evaluation.log
