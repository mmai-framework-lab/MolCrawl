name: Documentation
on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "docs-src/**"
      - "README.md"
      - "**.py"
      - ".github/workflows/documentation.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check-readme:
    name: Validate README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown files
        uses: avto-dev/markdown-lint@v1
        with:
          config: ".markdownlint.json"
          args: "README.md docs/*.md"
  generate-api-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    env:
      LEARNING_SOURCE_DIR: learning_source_dummy
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdoc3
          pip install datasets
          pip install -e .
      - name: Generate API docs with pdoc
        run: |
          pdoc --html --output-dir api-docs molcrawl/ --skip-errors
      - name: Upload API documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: api-docs/
  build-site:
    name: Build Complete Documentation Site
    needs: generate-api-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download API documentation
        uses: actions/download-artifact@v4
        with:
          name: api-documentation
          path: api-docs/
      - name: Build documentation site
        run: |
          # Create output directory
          mkdir -p site

          # Copy custom pages from docs-src
          cp -r docs-src/* site/

          # Copy pdoc API docs to api/ subdirectory
          mkdir -p site/api
          cp -r api-docs/molcrawl/* site/api/

          # Create .nojekyll file for GitHub Pages
          touch site/.nojekyll

          # List final structure
          echo "📁 Final site structure:"
          find site -type f | head -50
      - name: Upload complete site
        uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: site/
  deploy-to-gh-pages:
    name: Deploy Documentation to GitHub Pages
    needs: build-site
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download complete documentation site
        uses: actions/download-artifact@v4
        with:
          name: documentation-site
          path: site/
      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: "docs: update documentation site [skip ci]"
