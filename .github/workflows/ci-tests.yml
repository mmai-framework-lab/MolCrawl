name: CI Tests

on:
  push:
    branches: [ main, develop, "update/**", "feature/**", "phase/**" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'environment.yaml'
      - '.github/workflows/ci-tests.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2"
          pip install pytest pytest-benchmark pytest-cov pytest-xdist
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install pyarrow
          pip install rdkit-pypi
          pip install -e .
      
      - name: Run unit tests
        run: |
          pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term -n auto
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2"
          pip install pytest
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install pandas rdkit-pypi
          pip install -e .
      
      - name: Run integration tests
        run: |
          pytest tests/integration -v --tb=short

  model-sanity-checks:
    name: Model Sanity Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install datasets
          pip install -e .
      
      - name: Test BERT initialization
        run: |
          python - <<'PY'
          import bert.test_checkpoint as bert_test

          print("✓ BERT test module import ok", bert_test.__name__)
          PY
      
      - name: Test GPT2 initialization
        run: |
          python - <<'PY'
          import sys
          import os
          from pathlib import Path

          project_root = Path(os.environ.get("GITHUB_WORKSPACE", Path.cwd()))
          sys.path.insert(0, str(project_root / "gpt2"))
          sys.path.insert(0, str(project_root / "src"))

          import gpt2.test_checkpoint as gpt2_test

          print("✓ GPT2 test module import ok", gpt2_test.__name__)
          PY

  type-checking:
    name: Type Checking (MyPy)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
      
      - name: Run MyPy
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
      
      - name: Run Safety scan
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          if [ -z "$SAFETY_API_KEY" ]; then
            echo "SAFETY_API_KEY is not set; skipping safety scan."
            exit 0
          fi
          pip freeze | safety scan --stdin --no-interaction || true
      
      - name: Run Bandit security scan
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json --exit-zero

      - name: Summarize Bandit results
        if: always()
        run: |
          echo "## Bandit Security Scan" >> "$GITHUB_STEP_SUMMARY"
          if [ -f bandit-report.json ]; then
            echo "- JSON report generated" >> "$GITHUB_STEP_SUMMARY"
            count=$(python -c "import json; data=json.load(open('bandit-report.json')); print(len(data.get('results', [])))")
            echo "- Findings (count): ${count}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No report file found" >> "$GITHUB_STEP_SUMMARY"
          fi
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
        if: always()
