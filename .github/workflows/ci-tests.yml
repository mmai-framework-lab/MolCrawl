name: CI Tests

on:
  push:
    branches: [ main, develop, "update/**", "feature/**", "phase/**" ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'environment.yaml'
      - '.github/workflows/ci-tests.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install -e .
      
      - name: Run unit tests
        run: |
          pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term -n auto
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install -e .
      
      - name: Run integration tests
        run: |
          pytest tests/integration -v --tb=short
        continue-on-error: true

  model-sanity-checks:
    name: Model Sanity Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install -e .
      
      - name: Test BERT initialization
        run: |
          python -c "
          from bert.test_checkpoint import load_model_for_testing
          print('✓ BERT model initialization check passed')
          "
        continue-on-error: true
      
      - name: Test GPT2 initialization
        run: |
          python -c "
          from gpt2.test_checkpoint import load_checkpoint_and_generate
          print('✓ GPT2 model initialization check passed')
          "
        continue-on-error: true

  data-pipeline-validation:
    name: Data Pipeline Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers datasets
          pip install -e .
      
      - name: Validate data loading scripts
        run: |
          pytest tests/data -v --tb=short
        continue-on-error: true

  type-checking:
    name: Type Checking (MyPy)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
      
      - name: Run MyPy
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
      
      - name: Run Safety check
        run: |
          pip freeze | safety check --stdin
        continue-on-error: true
      
      - name: Run Bandit security scan
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
        if: always()
