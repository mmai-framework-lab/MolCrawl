name: ESLint
on:
  push:
    branches: [main, develop, "update/**", "feature/**"]
    paths:
      - 'molcrawl-web/**/*.js'
      - 'molcrawl-web/**/*.jsx'
      - 'molcrawl-web/package.json'
      - '.github/workflows/eslint.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'molcrawl-web/**/*.js'
      - 'molcrawl-web/**/*.jsx'
jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: molcrawl-web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: molcrawl-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint --if-present || npx eslint src --ext .js,.jsx --format=stylish
        continue-on-error: true
      - name: Run ESLint (Strict - Error on Critical Issues)
        run: npx eslint src --ext .js,.jsx --max-warnings 0 --format=stylish
