name: Phase Validation
on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to validate'
        required: true
        type: choice
        options:
          - 'phase1-bert-verification'
          - 'phase1-gpt2-verification'
          - 'phase2-dataset-prep'
          - 'phase2-script-verification'
          - 'phase3-alpha-evaluation'
      task:
        description: 'Specific task (optional)'
        required: false
        type: string
jobs:
  phase1-bert-verification:
    if: inputs.phase == 'phase1-bert-verification'
    name: Phase 1 - BERT Verification
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain: ['dna', 'protein', 'rna', 'compound', 'compound-lang']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install -e .
      - name: Run BERT verification for ${{ matrix.domain }}
        run: |
          echo "Running BERT verification for ${{ matrix.domain }}"
          python molcrawl/bert/test_checkpoint.py --domain ${{ matrix.domain }} --quick-test
        continue-on-error: true
      - name: Generate verification report
        run: |
          echo "# BERT Verification Report - ${{ matrix.domain }}" > bert-report-${{ matrix.domain }}.md
          echo "Date: $(date)" >> bert-report-${{ matrix.domain }}.md
          echo "Status: See test output above" >> bert-report-${{ matrix.domain }}.md
      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: bert-verification-${{ matrix.domain }}
          path: bert-report-${{ matrix.domain }}.md
  phase1-gpt2-verification:
    if: inputs.phase == 'phase1-gpt2-verification'
    name: Phase 1 - GPT2 Verification
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain: ['dna', 'protein', 'rna', 'compound', 'compound-lang']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1 accelerate==0.34.2
          pip install -e .
      - name: Run GPT2 verification for ${{ matrix.domain }}
        run: |
          echo "Running GPT2 verification for ${{ matrix.domain }}"
          python molcrawl/gpt2/test_checkpoint.py --domain ${{ matrix.domain }} --quick-test
        continue-on-error: true
      - name: Generate verification report
        run: |
          echo "# GPT2 Verification Report - ${{ matrix.domain }}" > gpt2-report-${{ matrix.domain }}.md
          echo "Date: $(date)" >> gpt2-report-${{ matrix.domain }}.md
          echo "Status: See test output above" >> gpt2-report-${{ matrix.domain }}.md
      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: gpt2-verification-${{ matrix.domain }}
          path: gpt2-report-${{ matrix.domain }}.md
  phase2-dataset-prep:
    if: inputs.phase == 'phase2-dataset-prep'
    name: Phase 2 - Dataset Preparation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .
      - name: Validate dataset scripts
        run: |
          pytest tests/phase2/test_dataset_preparation.py -v
        continue-on-error: true
      - name: Check benchmark data configuration
        run: |
          echo "scripts.validate_benchmark_data: not yet implemented, skipping."
        continue-on-error: true
  phase2-script-verification:
    if: inputs.phase == 'phase2-script-verification'
    name: Phase 2 - Script Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain: ['dna', 'protein', 'rna', 'compound', 'compound-lang']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Verify training scripts for ${{ matrix.domain }}
        run: |
          echo "Verifying training scripts for ${{ matrix.domain }}"
          echo "scripts.verify_training_scripts: not yet implemented, skipping."
        continue-on-error: true
  phase3-alpha-evaluation:
    if: inputs.phase == 'phase3-alpha-evaluation'
    name: Phase 3 - Alpha Model Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.45.1
          pip install -e .
      - name: Run alpha model evaluation
        run: |
          echo "Running alpha model evaluation"
          echo "scripts.evaluate_alpha_models: not yet implemented, skipping."
        continue-on-error: true
      - name: Generate evaluation report
        run: |
          echo "scripts.generate_evaluation_report: not yet implemented, skipping."
        continue-on-error: true
      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: alpha-evaluation-results
          path: evaluation_results/
        if: always()
