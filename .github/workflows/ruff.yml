name: Ruff Lint

on:
  push:
    branches: [ main, develop, "update/**", "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install Ruff
        run: pip install ruff
      
      - name: Run Ruff Check
        run: ruff check . --output-format=github
        continue-on-error: true
      
      - name: Run Ruff Check (Strict - Error on Critical Issues)
        run: |
          # Only fail on F (pyflakes - undefined names, unused imports, etc.) and E9 (syntax errors)
          ruff check . --select F,E9 --output-format=github
